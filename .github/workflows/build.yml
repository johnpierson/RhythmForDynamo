name: Build RhythmForDynamo

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Authenticate GitHub Packages NuGet source
        run: |
          dotnet nuget update source johnpierson-github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Setup MSBuild for .NET Framework
        uses: microsoft/setup-msbuild@v1.3

      - name: Extract version information from project files
        id: version_info
        run: |
          # Extract version suffix from RhythmRevit.csproj (e.g. "4.1" from "$(RevitVersion).4.1")
          $revitCsproj = [xml](Get-Content "src/RhythmRevit/RhythmRevit.csproj")
          $revitVersionTemplate = ($revitCsproj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -Last 1).Version
          $revitVersionSuffix = ($revitVersionTemplate -replace '\$\(RevitVersion\)\.', '')
          Write-Host "RhythmRevit version suffix: $revitVersionSuffix"

          # Extract assembly version suffix from RhythmCore.csproj (e.g. "1.1" from "$(RevitVersion).1.1")
          $coreCsproj = [xml](Get-Content "src/RhythmCore/RhythmCore.csproj")
          $coreAssemblyVersionTemplate = ($coreCsproj.Project.PropertyGroup | Where-Object { $_.AssemblyVersion } | Select-Object -Last 1).AssemblyVersion
          $coreVersionSuffix = ($coreAssemblyVersionTemplate -replace '\$\(RevitVersion\)\.', '')
          Write-Host "RhythmCore assembly version suffix: $coreVersionSuffix"

          echo "REVIT_VERSION_SUFFIX=$revitVersionSuffix" >> $env:GITHUB_ENV
          echo "CORE_VERSION_SUFFIX=$coreVersionSuffix" >> $env:GITHUB_ENV

      - name: Build RhythmCore - Release R20
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R20" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2020.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2020.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2020.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2020" /p:Description="Rhythm for Dynamo|Core2020" /p:Product="Rhythm for Dynamo|Core2020"

      - name: Build RhythmCore - Release R21
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R21" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2021.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2021.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2021.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2021" /p:Description="Rhythm for Dynamo|Core2021" /p:Product="Rhythm for Dynamo|Core2021"

      - name: Build RhythmCore - Release R22
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R22" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2022.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2022.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2022.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2022" /p:Description="Rhythm for Dynamo|Core2022" /p:Product="Rhythm for Dynamo|Core2022"

      - name: Build RhythmCore - Release R23
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R23" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2023.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2023.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2023.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2023" /p:Description="Rhythm for Dynamo|Core2023" /p:Product="Rhythm for Dynamo|Core2023"

      - name: Build RhythmCore - Release R24
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R24" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2024.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2024.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2024.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2024" /p:Description="Rhythm for Dynamo|Core2024" /p:Product="Rhythm for Dynamo|Core2024"

      - name: Build RhythmCore - Release R25
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R25" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2025.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2025.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2025.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2025" /p:Description="Rhythm for Dynamo|Core2025" /p:Product="Rhythm for Dynamo|Core2025"

      - name: Build RhythmCore - Release R26
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R26" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2026.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2026.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2026.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2026" /p:Description="Rhythm for Dynamo|Core2026" /p:Product="Rhythm for Dynamo|Core2026"

      - name: Build RhythmCore - Release R27
        run: |
          msbuild src/RhythmCore/RhythmCore.sln /p:Configuration="Release R27" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2027.$env:CORE_VERSION_SUFFIX" /p:AssemblyVersion="2027.$env:CORE_VERSION_SUFFIX" /p:FileVersion="2027.$env:CORE_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Core2027" /p:Description="Rhythm for Dynamo|Core2027" /p:Product="Rhythm for Dynamo|Core2027"

      - name: Build RhythmRevit - Release R20
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R20" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2020.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2020.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2020.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2020" /p:Description="Rhythm for Dynamo|Revit2020" /p:Product="Rhythm for Dynamo|Revit2020"

      - name: Build RhythmRevit - Release R21
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R21" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2021.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2021.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2021.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2021" /p:Description="Rhythm for Dynamo|Revit2021" /p:Product="Rhythm for Dynamo|Revit2021"

      - name: Build RhythmRevit - Release R22
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R22" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2022.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2022.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2022.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2022" /p:Description="Rhythm for Dynamo|Revit2022" /p:Product="Rhythm for Dynamo|Revit2022"

      - name: Build RhythmRevit - Release R23
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R23" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2023.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2023.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2023.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2023" /p:Description="Rhythm for Dynamo|Revit2023" /p:Product="Rhythm for Dynamo|Revit2023"

      - name: Build RhythmRevit - Release R24
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R24" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2024.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2024.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2024.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2024" /p:Description="Rhythm for Dynamo|Revit2024" /p:Product="Rhythm for Dynamo|Revit2024"

      - name: Build RhythmRevit - Release R25
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R25" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2025.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2025.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2025.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2025" /p:Description="Rhythm for Dynamo|Revit2025" /p:Product="Rhythm for Dynamo|Revit2025"

      - name: Build RhythmRevit - Release R26
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R26" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2026.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2026.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2026.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2026" /p:Description="Rhythm for Dynamo|Revit2026" /p:Product="Rhythm for Dynamo|Revit2026"

      - name: Build RhythmRevit - Release R27
        run: |
          msbuild src/RhythmRevit/RhythmRevit.sln /p:Configuration="Release R27" /p:Platform="Any CPU" /t:Restore,Build /p:Version="2027.$env:REVIT_VERSION_SUFFIX" /p:AssemblyVersion="2027.$env:REVIT_VERSION_SUFFIX" /p:FileVersion="2027.$env:REVIT_VERSION_SUFFIX" /p:Title="Rhythm for Dynamo|Revit2027" /p:Description="Rhythm for Dynamo|Revit2027" /p:Product="Rhythm for Dynamo|Revit2027"

      - name: Verify deploy folder structure
        run: |
          Write-Host "Verifying deploy folder structure..."
          $deployPath = "deploy"
          $rhythmCoreVersions = @("2020", "2021", "2022", "2023", "2024", "2025", "2026", "2027")
          $rhythmRevitVersions = @("2020", "2021", "2022", "2023", "2024", "2025", "2026", "2027")
          
          $allValid = $true
          
          foreach ($version in $rhythmCoreVersions) {
            $dllPath = Join-Path $deployPath $version "RhythmCore.dll"
            $xmlPath = Join-Path $deployPath $version "RhythmCore.xml"
            if (-not (Test-Path $dllPath)) {
              Write-Host "ERROR: Missing $dllPath" -ForegroundColor Red
              $allValid = $false
            } else {
              Write-Host "✓ Found $dllPath" -ForegroundColor Green
            }
            if (-not (Test-Path $xmlPath)) {
              Write-Host "WARNING: Missing $xmlPath" -ForegroundColor Yellow
            } else {
              Write-Host "✓ Found $xmlPath" -ForegroundColor Green
            }
          }
          
          foreach ($version in $rhythmRevitVersions) {
            $dllPath = Join-Path $deployPath $version "RhythmRevit.dll"
            $xmlPath = Join-Path $deployPath $version "RhythmRevit.xml"
            if (-not (Test-Path $dllPath)) {
              Write-Host "ERROR: Missing $dllPath" -ForegroundColor Red
              $allValid = $false
            } else {
              Write-Host "✓ Found $dllPath" -ForegroundColor Green
            }
            if (-not (Test-Path $xmlPath)) {
              Write-Host "WARNING: Missing $xmlPath" -ForegroundColor Yellow
            } else {
              Write-Host "✓ Found $xmlPath" -ForegroundColor Green
            }
          }
          
          if (-not $allValid) {
            Write-Host "Build verification failed - some required files are missing" -ForegroundColor Red
            exit 1
          }
          Write-Host "All required files verified successfully!" -ForegroundColor Green

      - name: Configure Git
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push deploy folder changes
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git add deploy/
          $changes = git diff --cached --name-only
          if ($changes) {
            $commitMessage = "chore: update deploy folder with latest builds [skip ci]"
            git commit -m $commitMessage
            Write-Host "Committed deploy folder changes"
            git push origin HEAD:${{ github.ref_name }}
            Write-Host "Pushed changes to ${{ github.ref_name }}"
          } else {
            Write-Host "No changes to commit in deploy folder"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-folder
          path: deploy/
          retention-days: 30
